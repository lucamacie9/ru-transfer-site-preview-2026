<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Institution & Program Selection - Transfer Credit Match</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background: #F8F9FA;
      padding-top: 60px;
    }
    .director-header-overlay {
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .director-header {
      position: relative;
      height: 300px;
      background: url('https://d13kjxnqnhcmn2.cloudfront.net/AcuCustom/Sitename/DAM/055/Uni_students_-_Main.png') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      color: white;
    }
    .director-header::after {
      content: "Select Institution & Program";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Merriweather', serif;
      font-size: 48px;
      font-weight: 700;
      z-index: 1;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    .selection-card {
      background-color: #ffffff;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
    }
    .visually-hidden-select {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }
  </style>
</head>
<body>
  <!-- Navbar (aligned with other pages) -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-black fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Transfer Credit Match</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="auth.html">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Header banner -->
  <div class="director-header">
    <div class="director-header-overlay"></div>
  </div>

  <!-- Selection component -->
  <div class="container my-5">
    <div class="selection-card">
      <h3 class="mb-3">Plan Your Transfer Path</h3>
      <p class="text-muted mb-4">
        Choose your <strong>current institution</strong>, your <strong>target institution</strong>, and the
        <strong>target program</strong> you want to transfer into.
      </p>

      <!-- Institutions row -->
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <h5>Current Institution</h5>
          <label for="currentInstitutionAutocomplete" class="form-label">Type to search + select</label>
          <input id="currentInstitutionAutocomplete" class="form-control mb-2" type="text" placeholder="Start typing (e.g., Truman)..." autocomplete="off" list="currentInstitutionDatalist">
          <datalist id="currentInstitutionDatalist"></datalist>
          <label for="currentInstitutionSelect" class="form-label visually-hidden">Current Institution</label>
          <select id="currentInstitutionSelect" class="form-select visually-hidden-select" aria-hidden="true" tabindex="-1">
            <option value="">Loading institutions...</option>
          </select>
        </div>
        <div class="col-md-6">
          <h5>Target Institution</h5>
          <label for="targetInstitutionSelect" class="form-label">Target Institution</label>
          <select id="targetInstitutionSelect" class="form-select">
            <option value="">Select Institution</option>
            <option value="__default_roosevelt__" selected>Roosevelt University</option>
            <option value="" disabled>Loading institutions...</option>
          </select>
        </div>
      </div>

      <!-- Target program row (depends on target institution) -->
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <h5>Target Program</h5>
          <label for="targetProgramAutocomplete" class="form-label">Type to search + select</label>
          <input id="targetProgramAutocomplete" class="form-control mb-2" type="text" placeholder="Start typing (e.g., Nursing)..." autocomplete="off" list="targetProgramDatalist" disabled>
          <datalist id="targetProgramDatalist"></datalist>
          <label for="targetProgramSelect" class="form-label visually-hidden">Program at Target Institution</label>
          <select id="targetProgramSelect" class="form-select visually-hidden-select" aria-hidden="true" tabindex="-1" disabled>
            <option value="">Select a target institution first</option>
          </select>
        </div>
      </div>

      <!-- Summary / confirmation -->
      <div class="mt-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
        <button id="confirmSelectionBtn" class="btn btn-primary" disabled>
          Confirm Transfer Goal
        </button>
        <div id="selectionSummary" class="text-muted small"></div>
      </div>
    </div>
  </div>

  <footer class="bg-success bg-gradient text-white text-center py-0.5">
    <p>© 2026 Transfer Credit Match. All Rights Reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="roosevelt_programs.js"></script>
  <script>
    // Simple reusable initializer so this logic can be copy-pasted into other pages if needed.
    function initInstitutionProgramSelector(options) {
      const {
        currentInstitutionSelectId = 'currentInstitutionSelect',
        currentInstitutionAutocompleteId = 'currentInstitutionAutocomplete',
        currentInstitutionDatalistId = 'currentInstitutionDatalist',
        targetInstitutionSelectId = 'targetInstitutionSelect',
        targetProgramSelectId = 'targetProgramSelect',
        targetProgramAutocompleteId = 'targetProgramAutocomplete',
        targetProgramDatalistId = 'targetProgramDatalist',
        confirmButtonId = 'confirmSelectionBtn',
        summaryElementId = 'selectionSummary'
      } = options || {};

      const currentInstitutionSelect = document.getElementById(currentInstitutionSelectId);
      const currentInstitutionAutocomplete = document.getElementById(currentInstitutionAutocompleteId);
      const currentInstitutionDatalist = document.getElementById(currentInstitutionDatalistId);
      const targetInstitutionSelect = document.getElementById(targetInstitutionSelectId);
      const targetProgramSelect = document.getElementById(targetProgramSelectId);
      const targetProgramAutocomplete = document.getElementById(targetProgramAutocompleteId);
      const targetProgramDatalist = document.getElementById(targetProgramDatalistId);
      const confirmBtn = document.getElementById(confirmButtonId);
      const summaryEl = document.getElementById(summaryElementId);

      const TARGET_INST_VALUE = '__roosevelt__';
      const TARGET_INST_LABEL = 'Roosevelt University';

      const CURRENT_INSTITUTION_STRUCTURE = [
        {
          optgroup: 'City Colleges of Chicago',
          options: [
            { value: 'ccc-truman', label: 'Truman College' },
            { value: 'ccc-harold-washington', label: 'Harold Washington College' },
            { value: 'ccc-wilbur-wright', label: 'Wilbur Wright College' },
            { value: 'ccc-olive-harvey', label: 'Olive-Harvey College' },
            { value: 'ccc-kennedy-king', label: 'Kennedy-King College' }
          ]
        },
        { value: 'other-community-college', label: 'Other Community College' },
        { value: 'other-university', label: 'Other University' }
      ];

      function currentInstitutionLabel(value) {
        for (let i = 0; i < CURRENT_INSTITUTION_STRUCTURE.length; i++) {
          const entry = CURRENT_INSTITUTION_STRUCTURE[i];
          if (entry.optgroup) {
            for (let j = 0; j < entry.options.length; j++) {
              if (entry.options[j].value === value) {
                return entry.optgroup + ' — ' + entry.options[j].label;
              }
            }
          } else if (entry.value === value) {
            return entry.label;
          }
        }
        return value;
      }

      function setSummary(text, isError) {
        if (!summaryEl) return;
        summaryEl.textContent = text;
        summaryEl.classList.toggle('text-danger', !!isError);
      }

      function populateCurrentInstitutions() {
        currentInstitutionSelect.innerHTML = '';
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = 'Select your current institution';
        currentInstitutionSelect.appendChild(placeholder);

        CURRENT_INSTITUTION_STRUCTURE.forEach(function (entry) {
          if (entry.optgroup) {
            const og = document.createElement('optgroup');
            og.label = entry.optgroup;
            entry.options.forEach(function (opt) {
              const o = document.createElement('option');
              o.value = opt.value;
              o.textContent = opt.label;
              og.appendChild(o);
            });
            currentInstitutionSelect.appendChild(og);
          } else {
            const o = document.createElement('option');
            o.value = entry.value;
            o.textContent = entry.label;
            currentInstitutionSelect.appendChild(o);
          }
        });
      }

      function populateRooseveltPrograms() {
        const programs = window.ROOSEVELT_PROGRAMS || [];
        targetProgramSelect.innerHTML = '';
        const ph = document.createElement('option');
        ph.value = '';
        ph.textContent = programs.length ? 'Select a program' : 'Program list unavailable';
        targetProgramSelect.appendChild(ph);

        programs.forEach(function (name, index) {
          const o = document.createElement('option');
          o.value = 'p-' + index;
          o.textContent = name;
          targetProgramSelect.appendChild(o);
        });

        targetProgramSelect.disabled = programs.length === 0;
        if (targetProgramAutocomplete) {
          targetProgramAutocomplete.disabled = programs.length === 0;
          if (programs.length === 0) targetProgramAutocomplete.value = '';
        }
        updateConfirmEnabled();
      }

      function selectedProgramName() {
        const programs = window.ROOSEVELT_PROGRAMS || [];
        const v = targetProgramSelect.value;
        if (!v || v.indexOf('p-') !== 0) return '';
        const idx = parseInt(v.slice(2), 10);
        return programs[idx] || '';
      }

      function updateConfirmEnabled() {
        const ok =
          !!currentInstitutionSelect.value &&
          targetInstitutionSelect.value === TARGET_INST_VALUE &&
          !!targetProgramSelect.value;
        confirmBtn.disabled = !ok;
      }

      populateCurrentInstitutions();
      targetInstitutionSelect.innerHTML = '';
      const tOpt = document.createElement('option');
      tOpt.value = TARGET_INST_VALUE;
      tOpt.textContent = TARGET_INST_LABEL;
      tOpt.selected = true;
      targetInstitutionSelect.appendChild(tOpt);
      targetInstitutionSelect.disabled = true;

      populateRooseveltPrograms();
      setSummary('Select your current institution and your target program at Roosevelt University.');

      currentInstitutionSelect.addEventListener('change', updateConfirmEnabled);
      targetProgramSelect.addEventListener('change', updateConfirmEnabled);

      function normalizeForSearch(s) {
        return String(s || '')
          .toLowerCase()
          .normalize('NFKD')
          .replace(/[\u0300-\u036f]/g, '')
          .trim();
      }

      function buildDatalistFromSelect(selectEl, datalistEl, displayForOption) {
        if (!selectEl || !datalistEl) return [];
        const items = [];
        datalistEl.innerHTML = '';
        Array.from(selectEl.querySelectorAll('option')).forEach(function (opt) {
          if (!opt.value) return; // skip placeholder
          const display = displayForOption ? displayForOption(opt) : opt.textContent;
          items.push({ value: opt.value, display: display });
          const dlOpt = document.createElement('option');
          dlOpt.value = display;
          datalistEl.appendChild(dlOpt);
        });
        return items;
      }

      function attachAutocompleteBehavior(inputEl, selectEl, datalistEl, getItems, onValidSelectionDisplay) {
        if (!inputEl || !selectEl || !datalistEl) return;

        function tryResolveSelection() {
          const raw = inputEl.value;
          const q = normalizeForSearch(raw);
          if (!q) {
            selectEl.value = '';
            updateConfirmEnabled();
            return;
          }

          const items = (typeof getItems === 'function' ? getItems() : []) || [];

          // Prefer exact (normalized) match, otherwise first "starts with", otherwise first "includes".
          let match =
            items.find(it => normalizeForSearch(it.display) === q) ||
            items.find(it => normalizeForSearch(it.display).startsWith(q)) ||
            items.find(it => normalizeForSearch(it.display).includes(q));

          if (!match) {
            selectEl.value = '';
            updateConfirmEnabled();
            return;
          }

          selectEl.value = match.value;
          if (typeof onValidSelectionDisplay === 'function') {
            onValidSelectionDisplay(match.display);
          }
          updateConfirmEnabled();
        }

        inputEl.addEventListener('change', tryResolveSelection);
        inputEl.addEventListener('blur', tryResolveSelection);
        inputEl.addEventListener('keydown', function (e) {
          if (e.key !== 'Enter') return;
          tryResolveSelection();
        });

        // If something else changes the select (future UI), keep input in sync.
        selectEl.addEventListener('change', function () {
          const items = (typeof getItems === 'function' ? getItems() : []) || [];
          const match = items.find(it => it.value === selectEl.value);
          if (match) inputEl.value = match.display;
        });
      }

      // Current institution autocomplete
      let currentInstitutionItems = [];
      function currentInstitutionDisplayForOption(opt) {
        const v = opt.value;
        const label = currentInstitutionLabel(v);
        return label || opt.textContent;
      }
      currentInstitutionItems = buildDatalistFromSelect(
        currentInstitutionSelect,
        currentInstitutionDatalist,
        currentInstitutionDisplayForOption
      );
      attachAutocompleteBehavior(
        currentInstitutionAutocomplete,
        currentInstitutionSelect,
        currentInstitutionDatalist,
        function () { return currentInstitutionItems; },
        function (display) { currentInstitutionAutocomplete.value = display; }
      );

      // Target program autocomplete
      let targetProgramItems = [];
      function rebuildTargetProgramAutocomplete() {
        targetProgramItems = buildDatalistFromSelect(targetProgramSelect, targetProgramDatalist);
      }
      rebuildTargetProgramAutocomplete();
      attachAutocompleteBehavior(
        targetProgramAutocomplete,
        targetProgramSelect,
        targetProgramDatalist,
        function () { return targetProgramItems; },
        function (display) { targetProgramAutocomplete.value = display; }
      );

      // When we repopulate programs, refresh datalist items too.
      const originalPopulateRooseveltPrograms = populateRooseveltPrograms;
      populateRooseveltPrograms = function () {
        originalPopulateRooseveltPrograms();
        rebuildTargetProgramAutocomplete();
      };

      confirmBtn.addEventListener('click', function () {
        const currentId = currentInstitutionSelect.value;
        const targetId = targetInstitutionSelect.value;
        const progVal = targetProgramSelect.value;

        if (!currentId || targetId !== TARGET_INST_VALUE || !progVal) {
          setSummary('Please select your current institution and a target program.', true);
          return;
        }

        const currentLabel = currentInstitutionLabel(currentId);
        const progName = selectedProgramName();

        setSummary(
          'Current: ' + currentLabel +
          ' → Target: ' + TARGET_INST_LABEL +
          ' | Target Program: ' + (progName || progVal)
        );
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      initInstitutionProgramSelector();
    });
  </script>
</body>
</html>
